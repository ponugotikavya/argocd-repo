apiVersion: apps/v1
kind: Deployment
metadata:
  name: mydeploy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: swiggy
      env: dev
  template:
    metadata:
      labels:
        app: swiggy
        env: dev
    spec:
      containers:
        - name: mycont
          image: shaikmustafa/anath:v1
          ports:
            - containerPort: 3000

